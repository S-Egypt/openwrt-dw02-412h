name: Build OpenWrt for AP152 (8MB)

on:
  workflow_dispatch: # Run manually from the Actions tab

env:
  # Using 22.03.6 because 23.05+ is usually too large for 8MB flash with 5GHz drivers
  VERSION: "22.03.6"
  TARGET: "ath79"
  SUBTARGET: "generic"
  PROFILE_NAME: "qca_ap152" # Standard AP152 reference profile

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

    - name: Download and Extract OpenWrt Image Builder
      run: |
        wget https://downloads.openwrt.org/releases/${{ env.VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/openwrt-imagebuilder-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}.Linux-x86_64.tar.xz
        tar -xvf openwrt-imagebuilder-*.tar.xz
        mv openwrt-imagebuilder-*/ imagebuilder/

    - name: Verify AP152 Profile Name
      run: |
        cd imagebuilder
        echo "Searching for AP152 profiles in this OpenWrt release..."
        make info | grep -i "ap152" || echo "Warning: No exact 'ap152' match found. Check make info."
        
        # We output the full list of profiles to a text file just in case
        make info > ../openwrt_profiles_list.txt

    - name: Build Firmware
      run: |
        cd imagebuilder
        
        # EXTREME 8MB FLASH DIET:
        # (+) QCA9557 2.4GHz & QCA9882 5GHz drivers + LuCI Web Interface
        # (-) Removed IPv6, PPPoE, and USB support to free up megabytes of space
        
        PACKAGES="kmod-ath9k kmod-ath10k ath10k-firmware-qca988x \
        luci luci-theme-bootstrap luci-app-opkg \
        -ipv6 -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables \
        -ppp -ppp-mod-pppoe -kmod-ppp -kmod-pppoe \
        -kmod-usb-core -kmod-usb2 -kmod-usb3 \
        -dnsmasq -dropbear"
        
        make image PROFILE="${{ env.PROFILE_NAME }}" PACKAGES="$PACKAGES"

    - name: Organize Firmware Files
      if: success()
      run: |
        mkdir output_firmware
        cp imagebuilder/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*sysupgrade.bin output_firmware/ || true
        cp imagebuilder/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*factory.bin output_firmware/ || true

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OpenWrt-AP152-Firmware
        path: output_firmware/

    - name: Upload Profile List (For Troubleshooting)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Supported-Profiles-List
        path: openwrt_profiles_list.txt
