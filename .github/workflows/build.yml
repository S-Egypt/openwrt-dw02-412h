name: Build OpenWrt for DW02-412H (AP152, 8MB)

on:
  workflow_dispatch: # Run manually from the Actions tab

env:
  VERSION: "22.03.6"
  TARGET: "ath79"
  SUBTARGET: "generic"
  PROFILE_NAME: "alfa-network_ap121f" # Closest AP152 reference

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

    - name: Download and Extract OpenWrt Image Builder
      run: |
        wget -O imagebuilder.tar.xz https://downloads.openwrt.org/releases/${{ env.VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/openwrt-imagebuilder-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}.Linux-x86_64.tar.xz
        if [ ! -s imagebuilder.tar.xz ]; then echo "Download failed!"; exit 1; fi
        tar -xvf imagebuilder.tar.xz
        mv openwrt-imagebuilder-*/ imagebuilder/

    - name: Verify AP152 Profile Name
      run: |
        cd imagebuilder
        echo "Searching for AP152 profiles in this OpenWrt release..."
        make info | grep -i "ap121"
        make info > ../openwrt_profiles_list.txt

    - name: Build Firmware
      run: |
        cd imagebuilder
        # For 8MB flash: remove IPv6, PPP, USB, some luci apps, but keep essential network and management
        PACKAGES="kmod-ath9k kmod-ath10k ath10k-firmware-qca988x \
        luci luci-theme-bootstrap \
        -ipv6 -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables \
        -ppp -ppp-mod-pppoe -kmod-ppp -kmod-pppoe \
        -kmod-usb-core -kmod-usb2 -kmod-usb3"
        make image PROFILE="${{ env.PROFILE_NAME }}" PACKAGES="$PACKAGES"

    - name: Organize Firmware Files
      if: success()
      run: |
        mkdir output_firmware
        cp imagebuilder/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*sysupgrade.bin output_firmware/ || true
        cp imagebuilder/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*factory.bin output_firmware/ || true

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OpenWrt-DW02-412H-Firmware
        path: output_firmware/

    - name: Upload Profile List (For Troubleshooting)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Supported-Profiles-List
        path: openwrt_profiles_list.txt
